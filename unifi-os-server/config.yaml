name: UniFi OS Server
version: "1.4.0"
slug: unifi_os_server
description: Self-hosted UniFi OS Server running its native systemd stack in a Home Assistant add-on.
url: https://github.com/clllaur/unifi-os-server-HA/tree/main/unifi-os-server
image: ghcr.io/clllaur/{arch}-addon-unifi-os-server
arch:
  - amd64
  - aarch64
init: false
stage: experimental
boot: manual
startup: services
# UniFi OS Server runs a full systemd service stack, needs raw sockets for
# device discovery/adoption, and manages its own cgroup hierarchy. This
# requires a privileged container with AppArmor disabled.
full_access: true
host_network: true
apparmor: false
tmpfs: true
# UniFi uses host networking, so it binds its ports (443, 8080, 3478/udp,
# 10001/udp, 10003/udp, ...) directly on the Home Assistant host. There is no
# NAT mapping to declare; the full port list is documented in DOCS.md. The
# webui [PORT:443] token resolves to the internal port (443) under host
# networking.
webui: "https://[HOST]:[PORT:443]"
options:
  UOS_SYSTEM_IP: ""
  HARDWARE_PLATFORM: ""
schema:
  UOS_SYSTEM_IP: str?
  HARDWARE_PLATFORM: "list(synology)?"
environment:
  container: docker
